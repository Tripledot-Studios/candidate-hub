<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">



<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tripledot Hub Builder</title>

<link href="./Tripledot Hub Builder_files/css2" rel="stylesheet">

<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{

  --navy:#1A1A1A;--navy-dark:#111111;--navy-mid:#333333;

  --orange:#F47B20;--orange-light:#FEF0E4;--orange-dark:#C85F0A;

  --orange-rich:#E8650A;--orange-deep:#CC5500;

  --teal:#00B899;--teal-light:#E0F7F3;--teal-dark:#007A65;

  --white:#fff;--off:#FDF8F4;--text:#1A1A1A;--text-mid:#4A4A4A;--text-light:#888888;

  --border:#EDE8E3;--sans:'DM Sans',system-ui,sans-serif;--display:'DM Serif Display',Georgia,serif;

  --brand:#2B7DC8;--brand-dark:#1A5EA0;--brand-light:#EBF4FF;

}

html{scroll-behavior:smooth}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

body{font-family:var(--sans);background:#FDF8F4;color:var(--text);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;}



/* ── APP SHELL ── */

.app{display:grid;grid-template-columns:380px 1fr;min-height:100vh;}



/* ── EDITOR PANEL ── */

.editor{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}

.editor-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);}

.editor-logo{display:flex;align-items:center;gap:8px;margin-bottom:16px;}

.e-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);}

.e-brand{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.01em;}

.editor-title{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-0.02em;line-height:1.2;}

.editor-sub{font-size:13px;color:var(--text-light);margin-top:4px;}

.editor-body{padding:20px 28px;flex:1;display:flex;flex-direction:column;gap:0;}



.e-section{margin-bottom:24px;}

.e-section-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--orange);margin-bottom:12px;display:flex;align-items:center;gap:8px;}

.e-section-label::after{content:'';flex:1;height:1px;background:var(--orange-light);}



.e-field{margin-bottom:12px;}

.e-label{font-size:12px;font-weight:600;color:var(--text-light);margin-bottom:6px;display:block;}

.e-input,.e-select,.e-textarea{width:100%;background:var(--off);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color 0.15s;}

.e-input::placeholder,.e-textarea::placeholder{color:#BBBBBB;}

.e-input:focus,.e-select:focus,.e-textarea:focus{border-color:var(--orange);background:var(--white);}

.e-select{cursor:pointer;-webkit-appearance:none;}

.e-select option{background:var(--white);color:var(--text);}

.e-textarea{resize:vertical;min-height:72px;line-height:1.5;}



.e-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}



.studio-badge{display:flex;align-items:center;gap:10px;background:var(--orange-light);border:1px solid rgba(244,123,32,0.25);border-radius:10px;padding:12px 14px;margin-top:4px;}

.studio-badge-icon{width:32px;height:32px;border-radius:8px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;flex-shrink:0;}

.studio-badge-info{}

.studio-badge-name{font-size:13px;font-weight:700;color:var(--orange-dark);}

.studio-badge-loc{font-size:11px;color:var(--orange-dark);opacity:0.7;}



.steps-list{display:flex;flex-direction:column;gap:8px;}

.step-row{display:flex;gap:8px;align-items:center;}

.step-num-badge{width:24px;height:24px;border-radius:50%;background:var(--off);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-light);flex-shrink:0;}

.step-num-badge.active{background:var(--orange);color:white;border-color:var(--orange);}



.editor-footer{padding:20px 28px;border-top:1px solid var(--border);}

.e-hint{font-size:12px;color:var(--text-light);line-height:1.5;margin-bottom:12px;}



.add-interviewer-btn{display:flex;align-items:center;gap:6px;background:none;border:1px dashed var(--border);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;color:var(--text-light);font-family:var(--sans);cursor:pointer;width:100%;justify-content:center;transition:all 0.15s;margin-top:8px;}

.add-interviewer-btn:hover{border-color:var(--orange);color:var(--orange);background:var(--orange-light);}

.add-interviewer-btn svg{width:12px;height:12px;}



.interviewer-card{background:var(--off);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;position:relative;}

.interviewer-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}

.interviewer-card-num{font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:0.08em;}

.interviewer-remove{background:none;border:none;cursor:pointer;color:var(--text-light);font-size:16px;line-height:1;padding:0;transition:color 0.15s;}

.interviewer-remove:hover{color:#E53E3E;}

.interviewer-type-row{display:flex;gap:6px;margin-bottom:8px;}

.type-chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:white;cursor:pointer;color:var(--text-light);transition:all 0.12s;font-family:var(--sans);}

.type-chip.selected{background:var(--orange);border-color:var(--orange);color:white;}

.linkedin-row{display:flex;align-items:center;gap:6px;margin-top:6px;}

.linkedin-icon{width:28px;height:28px;background:#0A66C2;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.linkedin-icon svg{width:14px;height:14px;}



.good-item-row{display:flex;gap:6px;align-items:flex-start;margin-bottom:6px;}

.good-item-row .e-input{flex:1;}

.good-remove{background:none;border:none;cursor:pointer;color:var(--text-light);font-size:16px;padding:8px 4px;line-height:1;transition:color 0.15s;font-family:var(--sans);}

.good-remove:hover{color:#E53E3E;}



.footer-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;}

.footer-btn{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;border:1px solid var(--border);background:white;color:var(--text-mid);transition:all 0.15s;white-space:nowrap;}

.footer-btn:hover{border-color:var(--orange);color:var(--orange);}

.footer-btn.print{width:100%;background:var(--orange);color:white;border-color:var(--orange);}

.footer-btn.print:hover{background:var(--orange-dark);}

.footer-btn.reset:hover{border-color:#E53E3E;color:#E53E3E;}



/* Section colour accents */

#h-studio .h-title{color:var(--orange);}

#h-benefits .h-title{color:#00B899;}

#h-role .h-title{color:#2B7DC8;}

#h-team .h-title{color:var(--orange);}

#h-process .h-title{color:#00B899;}

#h-prep .h-title{color:#2B7DC8;}

#h-faqs .h-title{color:var(--orange);}

#h-about .h-title{color:#2B7DC8;}

#h-why .h-title{color:#00B899;}

/* ── HUB OUTPUT ── */

.hub{overflow-y:auto;}



/* NAV */

.h-nav{background:var(--brand);border-bottom:3px solid var(--orange);padding:0 48px;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(0,0,0,0.25);}

.h-nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;}

.h-nav-logo{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}

.h-nav-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);}

.h-nav-links{display:flex;gap:2px;}

.h-nav-link{font-size:10px;font-weight:800;color:white;text-decoration:none;padding:5px 10px;border-radius:6px;transition:all 0.12s;white-space:nowrap;letter-spacing:0.06em;text-transform:uppercase;}

.h-nav-link:hover{color:var(--brand);background:white;}



/* HERO */

.h-hero{background:linear-gradient(135deg,#F47B20 0%,#E05C00 35%,#C84A00 65%,#A33800 100%);padding:56px 48px 0;position:relative;overflow:hidden;}



.h-hero-inner{max-width:960px;margin:0 auto;display:grid;grid-template-columns:1fr 360px;gap:48px;align-items:end;position:relative;z-index:1;}

.h-hero-left{padding-bottom:44px;}

.h-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(0,0,0,0.15);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:800;color:white;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px;}

.h-badge-dot{width:5px;height:5px;border-radius:50%;background:white;animation:pulse 2s infinite;}

.h-hero h1{font-size:clamp(32px,4vw,52px);font-weight:800;color:white;line-height:1.0;letter-spacing:-0.04em;margin-bottom:12px;}

.h-hero h1 span{color:rgba(255,255,255,0.75);}

.h-hero-sub{font-size:14px;color:rgba(255,255,255,0.82);line-height:1.55;max-width:420px;margin-bottom:20px;}

.h-chips{display:flex;gap:8px;flex-wrap:wrap;}

.h-chip{background:rgba(0,0,0,0.18);border:1px solid rgba(255,255,255,0.18);border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.9);}

.h-chip strong{color:white;font-weight:800;}

.h-hero-card{background:white;border-radius:16px 16px 0 0;padding:20px 24px;box-shadow:0 -4px 24px rgba(0,0,0,0.1);}

.h-hero-card-label{font-size:9px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-light);margin-bottom:12px;}

.h-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.h-stat{border-radius:10px;padding:14px 16px;}

.h-stat.plain{background:var(--off);}

.h-stat.org{background:var(--orange-light);}

.h-stat.tel{background:var(--teal-light);}

.h-stat-val{font-size:22px;font-weight:800;letter-spacing:-0.02em;line-height:1;}

.h-stat.org .h-stat-val{color:var(--orange-dark);}

.h-stat.tel .h-stat-val{color:var(--teal-dark);}

.h-stat.plain .h-stat-val{color:var(--text);}

.h-stat-lbl{font-size:10px;color:var(--text-light);font-weight:500;margin-top:3px;}



/* CONTENT */

.h-content{max-width:960px;margin:0 auto;padding:40px 48px 72px;}

.h-section{margin-bottom:40px;scroll-margin-top:64px;position:relative;overflow:hidden;}

.h-tag{display:inline-flex;align-items:center;gap:8px;font-size:9px;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:var(--orange);margin-bottom:8px;}

.h-tag-line{width:24px;height:3px;background:var(--orange);border-radius:2px;}

.h-tag.teal{color:#00B899;}

.h-tag.teal .h-tag-line{background:#00B899;}

.h-tag.green{color:#276749;}

.h-tag.green .h-tag-line{background:#38A169;}

.h-tag.blue{color:#2B7DC8;}

.h-tag.blue .h-tag-line{background:#2B7DC8;}

.h-title{font-size:30px;font-weight:800;color:var(--text);letter-spacing:-0.02em;margin-bottom:10px;line-height:1.08;font-family:var(--display);}

.h-body{font-size:14px;color:var(--text-mid);line-height:1.65;}

.h-body p+p{margin-top:10px;}

.h-hr{border:none;border-top:2px solid var(--border);margin:32px 0;}



/* CARDS */

.h-card{background:white;border-radius:12px;border:1px solid var(--border);padding:16px 20px;margin-top:10px;}

.h-card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;}

.h-card-body{font-size:13px;color:var(--text-mid);line-height:1.7;}



.h-callout{border-radius:10px;padding:18px 22px;margin-top:16px;}

.h-callout.dark{background:var(--orange-light);border:1px solid rgba(244,123,32,0.2);}

.h-callout.soft{background:var(--teal-light);}

.h-callout-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}

.h-callout.dark .h-callout-label{color:var(--orange-dark);}

.h-callout.soft .h-callout-label{color:#00B899;}

.h-callout-body{font-size:13px;line-height:1.7;}

.h-callout.dark .h-callout-body{color:var(--orange-dark);}

.h-callout.soft .h-callout-body{color:#00B899;}



/* AWARDS */

.h-awards{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}

.h-award{background:white;border:1px solid var(--border);border-radius:8px;padding:6px 13px;font-size:12px;color:var(--text-mid);}

.h-award strong{font-weight:600;color:var(--text);}



/* VALUES */

.h-values{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}

.h-value{background:white;border:1px solid var(--border);border-radius:12px;padding:16px 18px;transition:transform 0.2s,box-shadow 0.2s;}

.h-value:nth-child(1){border-top:3px solid var(--orange);}

.h-value:nth-child(2){border-top:3px solid #00B899;}

.h-value:nth-child(3){border-top:3px solid #2B7DC8;}

.h-value:nth-child(4){border-top:3px solid #00B899;}

.h-value:nth-child(odd):hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(244,123,32,0.15);}

.h-value:nth-child(even):hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,184,153,0.15);}

.h-value-icon{font-size:24px;margin-bottom:8px;}

.h-value-name{font-size:13px;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-0.01em;}

.h-value-desc{font-size:12px;color:var(--text-mid);line-height:1.6;}



/* STUDIOS */

.h-studios{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;}

.h-studio{background:white;border:1px solid var(--border);border-radius:10px;padding:14px 16px;}

.h-studio.active{border-color:var(--orange);background:var(--orange-light);}

.h-studio-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}

.h-studio.active .h-studio-name{color:var(--orange-dark);}

.h-studio-loc{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#00B899;margin-bottom:4px;}

.h-studio-games{font-size:11px;color:var(--text-light);line-height:1.5;}



/* PEOPLE */

.h-people{display:flex;flex-direction:column;gap:8px;margin-top:12px;}

.h-person{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;gap:12px;align-items:flex-start;transition:box-shadow 0.15s;}.h-person:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);}

.h-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;color:white;}

.av-n{background:var(--orange);}

.av-t{background:var(--teal);}

.h-person-tag{display:inline-block;background:var(--orange-light);color:var(--orange-dark);font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;margin-bottom:6px;}

.h-person-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:1px;}

.h-person-role{font-size:11px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;}

.h-person-bio{font-size:12px;color:var(--text-mid);line-height:1.6;}



/* PROCESS */

.h-process{margin-top:16px;}

.h-step{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);}

.h-step:last-child{border-bottom:none;}

.h-step-left{display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0;}

.h-step-circle{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;background:var(--border);color:var(--text-light);}

.h-step-circle.cur{background:var(--orange);color:white;box-shadow:0 0 0 4px rgba(244,123,32,0.2);}

.h-step:nth-child(1) .h-step-circle{background:var(--orange);color:white;}

.h-step:nth-child(2) .h-step-circle{background:#00B899;color:white;}

.h-step:nth-child(3) .h-step-circle{background:#2B7DC8;color:white;}

.h-step:nth-child(4) .h-step-circle{background:#2B7DC8;color:white;}

.h-step:nth-child(5) .h-step-circle{background:#E8650A;color:white;}

.h-step:nth-child(6) .h-step-circle{background:#0D9488;color:white;}

.h-step-line{width:2px;flex:1;background:var(--border);margin-top:4px;min-height:10px;}

.h-step-right{flex:1;padding-top:4px;}

.h-step-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:2px;letter-spacing:-0.01em;}

.h-step-desc{font-size:12px;color:var(--text-mid);line-height:1.6;}

.h-step-here{display:inline-flex;align-items:center;gap:5px;background:var(--orange-light);color:var(--orange-dark);font-size:10px;font-weight:700;padding:3px 10px;border-radius:5px;margin-top:6px;text-transform:uppercase;letter-spacing:0.05em;}

.h-step-dur{display:inline-block;background:var(--off);color:var(--text-light);font-size:10px;font-weight:600;padding:3px 10px;border-radius:5px;margin-top:6px;}



/* BENEFITS */

.h-benefits{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}

.h-benefit{background:white;border:1px solid var(--border);border-radius:10px;padding:13px 16px;}

.h-benefit:nth-child(1) .h-benefit-cat{color:var(--orange-dark);}

.h-benefit:nth-child(1){border-top:2px solid var(--orange);}

.h-benefit:nth-child(2) .h-benefit-cat{color:#007A65;}

.h-benefit:nth-child(2){border-top:2px solid #00B899;}

.h-benefit:nth-child(3) .h-benefit-cat{color:#1A5EA0;}

.h-benefit:nth-child(3){border-top:2px solid #2B7DC8;}

.h-benefit:nth-child(4) .h-benefit-cat{color:#007A65;}

.h-benefit:nth-child(4){border-top:2px solid #00B899;}

.h-benefit:nth-child(5) .h-benefit-cat{color:var(--orange-dark);}

.h-benefit:nth-child(5){border-top:2px solid var(--orange);}

.h-benefit:nth-child(6) .h-benefit-cat{color:#007A65;}

.h-benefit:nth-child(6){border-top:2px solid #00B899;}

.h-benefit-cat{font-size:9px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:#00B899;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}

.h-blist{list-style:none;display:flex;flex-direction:column;gap:6px;}

.h-blist li{font-size:12px;color:var(--text-mid);padding-left:14px;position:relative;line-height:1.5;}

.h-blist li::before{content:'';position:absolute;left:0;top:6px;width:5px;height:5px;border-radius:50%;background:var(--teal);}



/* PREP */

.h-prep{display:flex;flex-direction:column;gap:6px;margin-top:12px;}

.h-prep-item{background:white;border:1px solid var(--border);border-left:4px solid var(--orange);border-radius:0 10px 10px 0;padding:12px 16px;transition:border-left-color 0.15s,box-shadow 0.15s;}

.h-prep-item:hover{box-shadow:0 3px 12px rgba(0,0,0,0.06);}

.h-prep-item:nth-child(2){border-left-color:#00B899;}

.h-prep-item:nth-child(3){border-left-color:#2B7DC8;}

.h-prep-item:nth-child(4){border-left-color:#00B899;}

.h-prep-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-0.01em;}

.h-prep-body{font-size:12px;color:var(--text-mid);line-height:1.7;}



/* GOOD LIST */

.h-good{display:flex;flex-direction:column;gap:1px;border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-top:14px;}

.h-good-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:white;font-size:13px;color:var(--text-mid);line-height:1.6;}

.h-good-item+.h-good-item{border-top:1px solid var(--border);}

.h-tick{width:18px;height:18px;border-radius:50%;background:var(--teal-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}

.h-tick svg{width:9px;height:9px;}



/* FAQ */

.h-faq{margin-top:16px;}

.h-faq-item{border-bottom:1px solid var(--border);}

.h-faq-item:first-child{border-top:1px solid var(--border);}

.h-faq-q{font-size:14px;font-weight:700;color:var(--text);padding:12px 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;user-select:none;}

.h-faq-icon{width:26px;height:26px;border-radius:7px;background:var(--off);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;font-weight:300;color:var(--text-light);line-height:1;transition:all 0.15s;}

.h-faq-item.open .h-faq-icon{background:var(--orange);color:white;}

.h-faq-a{font-size:13px;color:var(--text-mid);line-height:1.75;padding-bottom:14px;display:none;}

.h-faq-item.open .h-faq-a{display:block;}



/* ── SECTION COLOUR ACCENTS ── */

.h-section-teal .h-tag { color: var(--teal-dark); }

.h-section-teal .h-tag-line { background: var(--teal); }

.h-section-teal .h-title { color: var(--text); }

.h-section-orange .h-tag { color: var(--orange-dark); }

.h-section-orange .h-tag-line { background: var(--orange); }



.h-hr-teal { border-top-color: var(--teal-light); }

.h-hr-orange { border-top-color: var(--orange-light); }



/* Coloured left-border on section titles */

.h-section-teal .h-title::before { content:''; display:inline-block; width:3px; height:0.85em; background:#00B899; border-radius:2px; margin-right:10px; vertical-align:middle; }

.h-section-orange .h-title::before { content:''; display:inline-block; width:3px; height:0.85em; background:var(--orange); border-radius:2px; margin-right:10px; vertical-align:middle; }



/* Teal on benefit cat headings already exist, but add teal to prep border */

.h-prep-item { border-left-color: var(--orange); }



/* Alternating value card accent */

.h-value:nth-child(odd) { border-top: 2px solid var(--orange-light); }

.h-value:nth-child(even) { border-top: 2px solid var(--teal-light); }



/* Teal on FAQ open icon already orange — add teal variant */

.h-faq-item:nth-child(1).open .h-faq-icon{background:var(--orange);}

.h-faq-item:nth-child(2).open .h-faq-icon{background:#00B899;}

.h-faq-item:nth-child(3).open .h-faq-icon{background:#2B7DC8;}

.h-faq-item:nth-child(4).open .h-faq-icon{background:#00B899;}

.h-faq-item:nth-child(even).open .h-faq-icon { background: var(--teal); }



/* Process circle colour for non-current steps */

.h-step-circle:not(.cur) { background: var(--teal-light); color: var(--teal-dark); border: 1px solid var(--teal); }

.h-step-line { background: linear-gradient(to bottom, var(--orange-light), rgba(0,184,153,0.2)); }
